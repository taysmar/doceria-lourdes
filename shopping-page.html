<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <title>Carrinho de compras</title>
</head>
<body>
    <section id="header">
        <div class="header-container">
            <div class="hader-logo">
                <img id="logo-img" src="./src/logo.svg" alt="Logomarca">
            </div>
            <div class="header-menu">
                <a href=#hero id="home">home</a>
                <a href=#delivery-field id="delivery">delivery</a>
                <a href=#contact-field id="contato">contato</a>
            </div>
            <div class="shopping-bag">
                <a href="#" id="img-shopping-bag"><img src="./src/ShoppingOutlined.png"></a>
            </div>
        </div>
    </section>
    <section>
        <div class="return">
            
            <button id="return-button"><i class="fa fa-long-arrow-left"></i></button> </div>
    </section>

    <section id="pedido">
        <div class="itens"></div>
        <div class="resumo"></div>
    </section>
    <section></section>
    
</body>
</html>
