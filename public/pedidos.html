<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazer Pedido</title>
</head>
<body>
    <h1>Fazer Pedido</h1>
    <form id="pedidoForm">
        <label for="clienteId">ID do Cliente:</label>
        <input type="text" id="clienteId" name="clienteId" required>
        <br>
        <label for="produtos">Produtos (nome e quantidade separados por vírgula):</label>
        <input type="text" id="produtos" name="produtos" required>
        <br>
        <label for="total">Total:</label>
        <input type="number" id="total" name="total" required>
        <br>
        <button type="submit">Enviar Pedido</button>
    </form>
    <script src="script.js"></script>
</body>
</html>
